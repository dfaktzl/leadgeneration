<style>
:root {
  --bg: #0e1117; --bg2: #161b22; --card: #1c2128; --border: #2d333b;
  --text: #e6edf3; --muted: #8b949e;
  --cyan: #39d0d8; --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #a371f7; --orange: #e3872d;
  --font: 'Outfit', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { font-family: var(--font); background: var(--bg); color: var(--text); }
body { min-height: 100vh; }

/* Top bar */
.topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 24px; position: sticky; top:0; z-index:50; }
.topbar-inner { max-width: 1440px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.app-title { font-size: 1.4rem; font-weight: 700; }
.app-title span { color: var(--cyan); font-weight: 400; }
.stats-bar { display: flex; gap: 16px; font-size: 0.8rem; flex-wrap: wrap; }
.stat { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px; background: rgba(255,255,255,0.04); }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Toolbar */
.toolbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 24px; position: sticky; top: 60px; z-index: 49; }
.toolbar-inner { max-width: 1440px; margin: 0 auto; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.search-box { flex: 1; min-width: 200px; }
.search-box input { width: 100%; padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font); font-size: 0.95rem; }
.search-box input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(57,208,216,0.15); }
.filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-group select { padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font); font-size: 0.85rem; cursor: pointer; }

/* Main grid */
.main { max-width: 1440px; margin: 0 auto; padding: 24px; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }

/* Lead card */
.lead-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 10px; cursor: pointer; transition: all 0.2s; position: relative; }
.lead-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

/* Color-coded card borders */
.lead-card.status-contacted { border-left: 4px solid var(--yellow); }
.lead-card.status-interested { border-left: 4px solid var(--green); }
.lead-card.status-not-interested { border-left: 4px solid var(--red); }
.lead-card.status-no-answer { border-left: 4px solid var(--muted); }
.lead-card.status-done { border-left: 4px solid var(--purple); opacity: 0.6; }

/* RED glow for no-website businesses */
.lead-card.no-website { border-color: rgba(248,81,73,0.4); background: rgba(248,81,73,0.05); }
.lead-card.no-website:hover { box-shadow: 0 4px 20px rgba(248,81,73,0.15); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.card-name { font-size: 1.05rem; font-weight: 600; line-height: 1.3; }
.card-badges { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }

/* Colorful category badges */
.badge-cat { font-size: 0.65rem; padding: 3px 8px; border-radius: 999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; }
.badge-status { font-size: 0.65rem; padding: 3px 8px; border-radius: 999px; font-weight: 600; white-space: nowrap; }

/* Category colors */
.cat-cafe,.cat-bakery,.cat-restaurant,.cat-takeaway,.cat-butcher { background: rgba(227,135,45,0.2); color: #e3872d; }
.cat-mechanic,.cat-plumber,.cat-electrician,.cat-auto { background: rgba(57,208,216,0.15); color: #39d0d8; }
.cat-accounting,.cat-bookkeeping,.cat-tax { background: rgba(163,113,247,0.15); color: #a371f7; }
.cat-photography,.cat-video,.cat-media { background: rgba(248,81,73,0.15); color: #f85149; }
.cat-health,.cat-dentist,.cat-vet,.cat-pharmacy { background: rgba(63,185,80,0.15); color: #3fb950; }
.cat-retail,.cat-beauty,.cat-fitness { background: rgba(210,153,34,0.15); color: #d29922; }
.cat-other { background: rgba(139,148,158,0.15); color: #8b949e; }

/* No website tag */
.badge-noweb { background: rgba(248,81,73,0.25); color: #f85149; }
.badge-hasweb { background: rgba(63,185,80,0.15); color: #3fb950; }

.card-meta { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
.card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-issues { display: flex; flex-direction: column; gap: 3px; }
.card-issue { font-size: 0.78rem; color: var(--text); padding: 4px 8px; background: rgba(57,208,216,0.06); border-radius: 6px; line-height: 1.4; }
.card-issue::before { content: '→'; color: var(--cyan); margin-right: 6px; font-weight: 700; }
.card-contacts { display: flex; gap: 6px; flex-wrap: wrap; }
.contact-chip { font-size: 0.75rem; padding: 3px 8px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); }
.contact-chip a { color: var(--cyan); text-decoration: none; }

/* Card actions row */
.card-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
.card-actions select { flex: 1; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font); font-size: 0.8rem; cursor: pointer; }
.btn-done { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--green); background: rgba(63,185,80,0.1); color: var(--green); font-family: var(--font); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.btn-done:hover { background: var(--green); color: #000; }
.btn-done.is-done { background: var(--green); color: #000; }
.btn-gemini { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--purple); background: rgba(163,113,247,0.1); color: var(--purple); font-family: var(--font); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; text-decoration: none; }
.btn-gemini:hover { background: var(--purple); color: #fff; }

.card-notes { width: 100%; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: var(--font); font-size: 0.8rem; resize: vertical; min-height: 32px; }
.card-notes::placeholder { color: var(--muted); }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; padding: 24px; }
.modal-overlay.active { display: flex; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
.modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; }
.modal h2 { font-size: 1.5rem; margin-bottom: 8px; }
.modal .m-meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 16px; }
.modal .m-desc { color: var(--text); line-height: 1.6; margin-bottom: 20px; }
.modal .m-section { margin-bottom: 20px; }
.modal .m-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--cyan); font-weight: 600; margin-bottom: 8px; }
.modal .m-issue { padding: 8px 12px; background: rgba(57,208,216,0.06); border-radius: 8px; margin-bottom: 6px; font-size: 0.9rem; }
.modal .m-issue::before { content: '→'; color: var(--cyan); margin-right: 8px; }
.modal .m-contacts a { color: var(--cyan); text-decoration: underline; }
.modal .m-website a { color: var(--purple); text-decoration: underline; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 1.1rem; grid-column: 1 / -1; }

@media (max-width: 500px) {
  .card-grid { grid-template-columns: 1fr; }
  .topbar-inner { flex-direction: column; align-items: flex-start; }
}

</style>

<script>document.addEventListener('DOMContentLoaded', () => {
  const STORAGE_KEY = 'phb_partner_tracker';
  function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
  function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
  let state = loadState();

  const ALL_LEADS = [].concat(
    typeof LEADS_CHARITY_1 !== 'undefined' ? LEADS_CHARITY_1 : [],
    typeof LEADS_CHARITY_2 !== 'undefined' ? LEADS_CHARITY_2 : [],
    typeof LEADS_CHARITY_3 !== 'undefined' ? LEADS_CHARITY_3 : []
  );

  const catSelect = document.getElementById('filter-category');
  function rebuildCategories() {
    catSelect.innerHTML = '<option value="all">All Categories</option>';
    const cats = [...new Set(ALL_LEADS.map(l => l.category))].sort();
    cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSelect.appendChild(o); });
  }
  rebuildCategories();

  const grid = document.getElementById('card-grid');
  const searchInput = document.getElementById('search');
  const statusFilter = document.getElementById('filter-status');
  const categoryFilter = document.getElementById('filter-category');
  const contactFilter = document.getElementById('filter-contact');
  const statsBar = document.getElementById('stats-bar');
  const modalOverlay = document.getElementById('modal-overlay');
  const modalContent = document.getElementById('modal-content');
  const modalClose = document.getElementById('modal-close');

  function getS(id) { return state[id]?.status || 'new'; }
  function getN(id) { return state[id]?.notes || ''; }
  function isDone(id) { return state[id]?.done || false; }
  function isCallback(id) { return state[id]?.callback || false; }

  function contactType(l) {
    if (l.email || l.phone) return 'direct';
    if (l.website) return 'form-only';
    return 'none';
  }

  function catClass(cat) {
    const c = cat.toLowerCase();
    if (c.includes('grant')) return 'cat-accounting'; // Greenish
    if (c.includes('corporate')) return 'cat-cafe'; // Orangey
    if (c.includes('philanthropy')) return 'cat-mechanic'; // Bluish
    if (c.includes('partner')) return 'cat-retail'; // Purple
    if (c.includes('pro-bono')) return 'cat-health'; // Reddish
    return 'cat-other';
  }

  function geminiUrl(l) {
    const prompt = encodeURIComponent(
      `I'm representing Perth Housing Bridge, a homeless charity in WA. We are reaching out to "${l.name}" (${l.category}, ${l.location}). ` +
      `Their organization info: ${l.desc} ` +
      `Our key talking points/issues to bring up with them: ${l.issues.join('; ')}. ` +
      `Write a professional, compelling outreach email/script (short, max 150 words) to start a conversation with them about potential collaboration, funding, or support. Be warm and partnership-focused.`
    );
    return `https://gemini.google.com/app?q=${prompt}`;
  }

  function statusEmoji(s) { return {new:'🔵',contacted:'🟡',interested:'🟢','not-interested':'🔴','no-answer':'⚪',done:'✅'}[s]||'🔵'; }

  function updateStats() {
    const leads = ALL_LEADS;
    const c = {new:0,contacted:0,interested:0,'not-interested':0,'no-answer':0,done:0};
    leads.forEach(l => { if(isDone(l.id)) c.done++; else c[getS(l.id)]++; });
    statsBar.innerHTML = `
      <span class="stat"><span class="stat-dot" style="background:#39d0d8"></span>New: ${c.new}</span>
      <span class="stat"><span class="stat-dot" style="background:#d29922"></span>Contacted: ${c.contacted}</span>
      <span class="stat"><span class="stat-dot" style="background:#3fb950"></span>In Progress: ${c.interested}</span>
      <span class="stat"><span class="stat-dot" style="background:#f85149"></span>Rejected: ${c['not-interested']}</span>
      <span class="stat"><span class="stat-dot" style="background:#8b949e"></span>No Ans: ${c['no-answer']}</span>
      <span class="stat"><span class="stat-dot" style="background:#a371f7"></span>Secured: ${c.done}</span>
      <span class="stat" style="font-weight:700">Total: ${leads.length}</span>`;
  }

  function render() {
    const search = searchInput.value.toLowerCase();
    const sF = statusFilter.value;
    const cF = categoryFilter.value;
    const ctF = contactFilter.value;
    const filtered = ALL_LEADS.filter(l => {
      if (search && !`${l.name} ${l.category} ${l.location} ${l.desc}`.toLowerCase().includes(search)) return false;
      const s = isDone(l.id) ? 'done' : getS(l.id);
      if (sF !== 'all' && s !== sF) return false;
      if (cF !== 'all' && l.category !== cF) return false;
      if (ctF !== 'all' && contactType(l) !== ctF) return false;
      return true;
    });
    if (!filtered.length) { grid.innerHTML = '<div class="empty-state">No partners match your filters.</div>'; updateStats(); return; }

    grid.innerHTML = filtered.map(l => {
      const s = isDone(l.id) ? 'done' : getS(l.id);
      const n = getN(l.id);
      const done = isDone(l.id);
      const cb = isCallback(l.id);
      const contacts = [];
      if (l.phone) contacts.push(`<span class="contact-chip">📞 <a href="tel:${l.phone}">${l.phone}</a></span>`);
      if (l.email) contacts.push(`<span class="contact-chip">✉️ <a href="mailto:${l.email}">${l.email}</a></span>`);
      if (l.website) contacts.push(`<span class="contact-chip">🌐 <a href="https://${l.website}" target="_blank" rel="noopener">${l.website}</a></span>`);

      return `<div class="lead-card status-${s}${cb?' is-callback':''}" data-id="${l.id}">
        <div class="card-top">
          <div><div class="card-name">${l.name}</div><div class="card-meta">📍 ${l.location}</div></div>
          <div class="card-badges">
            <span class="badge-cat ${catClass(l.category)}">${l.category}</span>
          </div>
        </div>
        <div class="card-desc">${l.desc}</div>
        <div class="card-issues">${l.issues.slice(0,2).map(i=>`<div class="card-issue">${i}</div>`).join('')}</div>
        <div class="card-contacts">${contacts.join('')}</div>
        <div class="card-actions">
          <select class="card-sel" data-id="${l.id}">
            <option value="new" ${s==='new'?'selected':''}>🔵 New</option>
            <option value="contacted" ${s==='contacted'?'selected':''}>🟡 Contacted</option>
            <option value="interested" ${s==='interested'?'selected':''}>🟢 In Progress</option>
            <option value="not-interested" ${s==='not-interested'?'selected':''}>🔴 Rejected</option>
            <option value="no-answer" ${s==='no-answer'?'selected':''}>⚪ No Answer</option>
          </select>
          <button class="btn-done${done?' is-done':''}" data-id="${l.id}">${done?'✅ Secured':'☐ Secured'}</button>
          <button class="btn-callback${cb?' active':''}" data-id="${l.id}">${cb?'📞 Call Back Needed':'📞 Call Back'}</button>
          <a class="btn-gemini" href="${geminiUrl(l)}" target="_blank" rel="noopener" title="Get AI outreach script">✨ Gemini</a>
        </div>
        <textarea class="card-notes" data-id="${l.id}" placeholder="Add notes...">${n}</textarea>
      </div>`;
    }).join('');

    grid.querySelectorAll('.card-sel').forEach(sel => {
      sel.addEventListener('change', e => { e.stopPropagation(); const id=+e.target.dataset.id; if(!state[id])state[id]={}; state[id].status=e.target.value; saveState(state); render(); });
    });
    grid.querySelectorAll('.btn-done').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); const id=+e.target.dataset.id; if(!state[id])state[id]={}; state[id].done=!state[id].done; saveState(state); render(); });
    });
    grid.querySelectorAll('.btn-callback').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); const id=+e.target.dataset.id; if(!state[id])state[id]={}; state[id].callback=!state[id].callback; saveState(state); render(); });
    });
    grid.querySelectorAll('.card-notes').forEach(ta => {
      ta.addEventListener('input', e => { const id=+e.target.dataset.id; if(!state[id])state[id]={}; state[id].notes=e.target.value; saveState(state); });
      ta.addEventListener('click', e => e.stopPropagation());
    });
    grid.querySelectorAll('.lead-card').forEach(card => {
      card.addEventListener('click', e => { if(e.target.closest('select,textarea,a,button')) return; openModal(+card.dataset.id); });
    });
    updateStats();
  }

  function openModal(id) {
    const l = ALL_LEADS.find(x=>x.id===id); if(!l)return;
    const s=isDone(l.id)?'done':getS(l.id), n=getN(l.id);
    let ch='';
    if(l.phone)ch+=`<div>📞 <a href="tel:${l.phone}">${l.phone}</a></div>`;
    if(l.email)ch+=`<div>✉️ <a href="mailto:${l.email}">${l.email}</a></div>`;
    if(!l.phone&&!l.email)ch+=`<div>📝 Contact via website</div>`;
    modalContent.innerHTML = `
      <h2>${l.name}</h2>
      <div class="m-meta">${l.category} · 📍 ${l.location} · ${statusEmoji(s)} ${s.replace('-',' ')}</div>
      ${l.website?`<div class="m-website m-section">🌐 <a href="https://${l.website}" target="_blank">${l.website}</a></div>`:''}
      <div class="m-desc">${l.desc}</div>
      <div class="m-section"><div class="m-label">Action Items / Pitch</div>${l.issues.map(i=>`<div class="m-issue">${i}</div>`).join('')}</div>
      <div class="m-section m-contacts"><div class="m-label">Contact Details</div>${ch}</div>
      <div class="m-section"><div class="m-label">Status</div>
        <select id="modal-status" style="width:100%;padding:10px;font-size:1rem;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font)">
          <option value="new" ${s==='new'?'selected':''}>🔵 New</option>
          <option value="contacted" ${s==='contacted'?'selected':''}>🟡 Contacted</option>
          <option value="interested" ${s==='interested'?'selected':''}>🟢 In Progress / App Sent</option>
          <option value="not-interested" ${s==='not-interested'?'selected':''}>🔴 Rejected</option>
          <option value="no-answer" ${s==='no-answer'?'selected':''}>⚪ No Answer</option>
        </select>
      </div>
      <div class="m-section"><div class="m-label">Notes</div><textarea id="modal-notes" style="width:100%;min-height:80px;padding:10px;font-size:0.95rem;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font)">${n}</textarea></div>
      <div class="m-section" style="text-align:center"><a class="btn-gemini" href="${geminiUrl(l)}" target="_blank" rel="noopener" style="display:inline-block;padding:12px 24px;font-size:1rem">✨ Draft Outreach with Gemini</a></div>`;
    document.getElementById('modal-status').addEventListener('change',e=>{if(!state[id])state[id]={};state[id].status=e.target.value;saveState(state);render();});
    document.getElementById('modal-notes').addEventListener('input',e=>{if(!state[id])state[id]={};state[id].notes=e.target.value;saveState(state);});
    modalOverlay.classList.add('active');
  }

  modalClose.addEventListener('click',()=>modalOverlay.classList.remove('active'));
  modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay)modalOverlay.classList.remove('active');});
  searchInput.addEventListener('input', render);
  statusFilter.addEventListener('change', render);
  categoryFilter.addEventListener('change', render);
  contactFilter.addEventListener('change', render);
  
  const notepad = document.getElementById('global-notepad');
  if (notepad) {
    notepad.value = localStorage.getItem(STORAGE_KEY + '_notepad') || '';
    notepad.addEventListener('input', e => localStorage.setItem(STORAGE_KEY + '_notepad', e.target.value));
  }

  render();
});
</script>
</body>
</html>
